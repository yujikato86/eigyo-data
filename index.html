<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年間 日別 貸し玉別一覧 — 自店 / N-1 / ニラク（大町）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:#f5f5f3;color:#1a1a18;font-size:13px;min-height:100vh}

/* ===== HEADER ===== */
.top-bar{background:#2C2C2A;padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.top-bar h1{color:#fff;font-size:15px;font-weight:600;margin-bottom:10px}

/* ===== MONTH TABS ===== */
.month-tabs{display:flex;gap:2px;overflow-x:auto;padding-bottom:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.month-tabs::-webkit-scrollbar{display:none}
.mtab{flex-shrink:0;padding:8px 16px;border-radius:8px 8px 0 0;border:none;background:rgba(255,255,255,.12);color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.mtab.active{background:#fff;color:#2C2C2A}
.mtab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* ===== TOOLBAR ===== */
.toolbar-wrap{background:#fff;border-bottom:1px solid #E8E6DF;padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.toolbar-group{display:flex;gap:3px;background:#F1EFE8;border-radius:8px;padding:3px}
.toolbar-label{font-size:11px;color:#888780;padding:0 4px;align-self:center}
.seg-btn{font-size:12px;padding:5px 12px;border-radius:6px;border:none;background:transparent;color:#5F5E5A;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s}
.seg-btn.active{background:#185FA5;color:#fff;font-weight:500}
.seg-btn:hover:not(.active){background:rgba(0,0,0,.06)}
.divider-v{width:1px;height:20px;background:#D3D1C7;margin:0 2px;align-self:center}

/* ===== SUMMARY BAR ===== */
.summary-bar{background:#F8F7F4;border-bottom:1px solid #E8E6DF;padding:8px 16px;display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#888780}
.summary-bar b{color:#1a1a18;font-size:12px}

/* ===== TABLE ===== */
.tbl-outer{margin:0;background:#fff}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;width:100%;min-width:820px}
thead{position:sticky;top:0;z-index:10}
.th-top-date{background:#2C2C2A;color:#fff}
.th-top-j{background:#185FA5;color:#fff}
.th-top-n{background:#3B6D11;color:#fff}
.th-top-ni{background:#854F0B;color:#fff}
th,td{padding:0;text-align:right;font-size:12px;border-right:0.5px solid #E8E6DF}
th:last-child,td:last-child{border-right:none}
.th-row1 th{padding:7px 9px;font-weight:500;font-size:11.5px}
.th-row2 th{padding:4px 9px;font-weight:400;font-size:10.5px;color:rgba(255,255,255,.75);border-top:0.5px solid rgba(255,255,255,.12)}
td{padding:6px 9px;border-bottom:0.5px solid #F1EFE8;vertical-align:middle}
td.left{text-align:left}
tr:hover td{background:#F8F7F4!important}
tr:last-child td{border-bottom:none}

/* ROW TYPES */
.row-future td{background:#FAFAF8;color:#8A8880}
.row-weekend td:nth-child(1),.row-weekend td:nth-child(2){color:#185FA5}
.row-sunday td:nth-child(1),.row-sunday td:nth-child(2){color:#A32D2D}
.sep-week td{border-top:2px solid #D3D1C7!important}

/* CELLS */
.day-cell{font-weight:600;font-size:12px;white-space:nowrap;min-width:40px}
.dow-cell{font-size:12px;font-weight:600;text-align:center!important;min-width:20px}
.ev-cell{min-width:110px;max-width:170px}
.badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;margin:1px;white-space:nowrap;line-height:1.5;font-weight:500}
.b-take{background:#B5D4F4;color:#0C447C}
.b-plan{background:#C0DD97;color:#27500A}
.b-sale{background:#FAC775;color:#633806}
.b-other{background:#D3D1C7;color:#444441}
.no-data{color:#C0BEB6;font-size:11px}
.pred-val{color:#B4B2A9;font-size:11px}
.val-hi{color:#0F6E56;font-weight:600}
.val-lo{color:#993C1D;font-weight:600}
.col-j{background:rgba(24,95,165,.03)}
.col-n{background:rgba(59,109,17,.03)}
.col-ni{background:rgba(133,79,11,.03)}
.total-col{font-weight:600}

/* ===== LEGEND ===== */
.legend{display:flex;gap:14px;font-size:11px;color:#888780;padding:10px 16px;flex-wrap:wrap;background:#fff;border-top:1px solid #E8E6DF}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}


/* EVENT ROWS */
.ev-row{display:flex;align-items:flex-start;gap:4px;margin:1px 0;flex-wrap:wrap}
.ev-label{flex-shrink:0;font-size:9.5px;font-weight:700;padding:2px 5px;border-radius:3px;line-height:1.4;white-space:nowrap;margin-top:1px}
.ev-tag{font-size:10.5px;padding:2px 6px;border-radius:4px;line-height:1.4;white-space:nowrap}
.lbl-j{background:#185FA5;color:#fff}
.lbl-n{background:#3B6D11;color:#fff}
.lbl-ni{background:#854F0B;color:#fff}
.tag-j{background:#D6E8FF;color:#0C3B73}
.tag-n{background:#D4EDBC;color:#1E4A06}
.tag-ni{background:#FAE3C0;color:#5C3005}

/* ===== MOBILE ===== */
@media(max-width:640px){
  .top-bar h1{font-size:13px}
  .mtab{padding:7px 11px;font-size:12px}
  .toolbar-wrap{padding:8px 10px;gap:6px}
  .seg-btn{padding:4px 9px;font-size:11px}
  td,th{padding:5px 7px;font-size:11px}
  .badge{font-size:9.5px;padding:1px 5px}
}
</style>

const MONTH_NAMES = {1:'1月',2:'2月',3:'3月',4:'4月',5:'5月',6:'6月'};
function pct(v){return v==null?null:(v*100).toFixed(1)+'%'}
function num(v){return v==null?null:Math.round(v).toLocaleString()}

let curMonth = 6, view='out', filter='all';

// ===== MONTH TABS =====
function buildTabs(){
  const wrap = document.getElementById('month-tabs');
  wrap.innerHTML = Object.keys(ALL_DATA).map(m => {
    const mn = parseInt(m);
    const data = ALL_DATA[m];
    const actual = data.filter(d=>d.has_actual).length;
    const total = data.length;
    const pct_done = Math.round(actual/total*100);
    const dotColor = mn===6?'#F5A623': actual===total?'#4CAF50':'#B0BEC5';
    return `<button class="mtab${mn===curMonth?' active':''}" onclick="setMonth(${mn})">
      <span class="dot" style="background:${dotColor}"></span>${MONTH_NAMES[mn]}
    </button>`;
  }).join('');
}

function setMonth(m){
  curMonth = m;
  document.querySelectorAll('.mtab').forEach((btn,i)=>{
    btn.classList.toggle('active', parseInt(Object.keys(ALL_DATA)[i])===m);
  });
  buildHead(); buildBody(); buildSummary();
}

// ===== SUMMARY =====
function buildSummary(){
  const data = ALL_DATA[curMonth] || [];
  const actual = data.filter(d=>d.has_actual);
  const n = actual.length || 1;
  const avgOut4 = actual.reduce((s,d)=>s+(d.out_4p||0),0) / n;
  const avgOut1 = actual.reduce((s,d)=>s+(d.out_1p||0),0) / n;
  const avgOut20 = actual.reduce((s,d)=>s+(d.out_20s||0),0) / n;
  const evDays = data.filter(d=>(d.ev_jiten||[]).length+(d.ev_n1||[]).length+(d.ev_ni_dai||[]).length+(d.ev_ni_nami||[]).length>0).length;
  document.getElementById('summary-bar').innerHTML = `
    <span>実績: <b>${actual.length}日 / ${data.length}日</b></span>
    <span>平均アウト 4円: <b>${Math.round(avgOut4).toLocaleString()}</b></span>
    <span>1円: <b>${Math.round(avgOut1).toLocaleString()}</b></span>
    <span>20スロ: <b>${Math.round(avgOut20).toLocaleString()}</b></span>
    <span>イベント日: <b>${evDays}日</b></span>
  `;
}

// ===== COLORIZE =====
function colorize(val, allNums){
  if(val==null) return '<span class="no-data">—</span>';
  if(!allNums||allNums.length<2) return val;
  const mx=Math.max(...allNums), mn=Math.min(...allNums);
  const vn=parseFloat(String(val).replace(/[,%]/g,''));
  if(mx===mn) return val;
  if(Math.abs(vn-mx)<0.01) return '<span class="val-hi">'+val+'</span>';
  if(Math.abs(vn-mn)<0.01) return '<span class="val-lo">'+val+'</span>';
  return val;
}

// ===== BODY =====
function buildBody(){
  let rows = (ALL_DATA[curMonth]||[]);
  if(filter==='actual') rows = rows.filter(d=>d.has_actual);
  if(filter==='event') rows = rows.filter(d=>(d.ev_jiten||[]).length+(d.ev_n1||[]).length+(d.ev_ni_dai||[]).length+(d.ev_ni_nami||[]).length>0);

  const col4 = rows.map(d=>d.out_4p).filter(x=>x!=null);
  const col1 = rows.map(d=>d.out_1p).filter(x=>x!=null);
  const col20 = rows.map(d=>d.out_20s).filter(x=>x!=null);

  let html='', prevWeek=-1;
  rows.forEach((d,i)=>{
    const week = Math.ceil(d.day/7);
    const isWeekSep = week!==prevWeek && i>0;
    prevWeek = week;

    const evHtml = buildEvCell(d);

    const dowCls = d.dow==='土'?'row-weekend': d.dow==='日'?'row-sunday':'';
    const futureCls = d.has_actual?'':'row-future';
    const rowCls = [futureCls, dowCls, isWeekSep?'sep-week':''].filter(Boolean).join(' ');

    let cells='';
    if(view==='out'){
      const s4 = d.has_actual ? colorize(num(d.out_4p),col4) : `<span class="pred-val">(${num(d.pred_4p)||'—'})</span>`;
      const s1 = d.has_actual ? colorize(num(d.out_1p),col1) : `<span class="pred-val">(${num(d.pred_1p)||'—'})</span>`;
      const s20 = d.has_actual ? colorize(num(d.out_20s),col20) : `<span class="pred-val">(${num(d.pred_20s)||'—'})</span>`;
      cells = `
<td class="col-j">${s4}</td><td class="col-j">${s1}</td><td class="col-j">${s20}</td>
<td class="col-n">${pct(d.n_4p_rate)||'—'}</td><td class="col-n">${pct(d.n_1p_rate)||'—'}</td><td class="col-n">${pct(d.n_20s_rate)||'—'}</td><td class="col-n total-col">${pct(d.n_t_rate)||'—'}</td>
<td class="col-ni">${pct(d.ni_4p_rate)||'—'}</td><td class="col-ni">${pct(d.ni_1p_rate)||'—'}</td><td class="col-ni">${pct(d.ni_20s_rate)||'—'}</td><td class="col-ni total-col">${pct(d.ni_t_rate)||'—'}</td>`;
    } else if(view==='rate'){
      const jv=[pct(d.j_4p_rate),pct(d.j_1p_rate),pct(d.j_20s_rate),pct(d.j_t_rate)];
      const nv=[pct(d.n_4p_rate),pct(d.n_1p_rate),pct(d.n_20s_rate),pct(d.n_t_rate)];
      const niv=[pct(d.ni_4p_rate),pct(d.ni_1p_rate),pct(d.ni_20s_rate),pct(d.ni_t_rate)];
      cells = jv.map((v,i)=>`<td class="col-j${i===3?' total-col':''}">${v||'—'}</td>`).join('');
      cells += nv.map((v,i)=>`<td class="col-n${i===3?' total-col':''}">${v||'—'}</td>`).join('');
      cells += niv.map((v,i)=>`<td class="col-ni${i===3?' total-col':''}">${v||'—'}</td>`).join('');
    } else {
      const jv=[pct(d.j_4p_sh),pct(d.j_1p_sh),pct(d.j_20s_sh),pct(d.j_t_sh)];
      const nv=[pct(d.n_4p_sh),pct(d.n_1p_sh),pct(d.n_20s_sh),pct(d.n_t_sh)];
      const niv=[pct(d.ni_4p_sh),pct(d.ni_1p_sh),pct(d.ni_20s_sh),pct(d.ni_t_sh)];
      cells = jv.map((v,i)=>`<td class="col-j${i===3?' total-col':''}">${v||'—'}</td>`).join('');
      cells += nv.map((v,i)=>`<td class="col-n${i===3?' total-col':''}">${v||'—'}</td>`).join('');
      cells += niv.map((v,i)=>`<td class="col-ni${i===3?' total-col':''}">${v||'—'}</td>`).join('');
    }

    html += `<tr class="${rowCls}">
<td class="left day-cell">${d.day}日</td>
<td class="dow-cell">${d.dow}</td>
<td class="left ev-cell">${evHtml||'<span class="no-data">—</span>'}</td>
${cells}
</tr>`;
  });
  document.getElementById('tbody').innerHTML = html;
}

function setView(v){
  view=v;
  ['out','rate','share'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('active',x===v));
  buildHead(); buildBody();
}
function setFilter(f,id){
  filter=f;
  ['f-all','f-actual','f-event'].forEach(x=>document.getElementById(x).classList.toggle('active',x===id));
  buildBody();
}


function buildEvCell(d){
  const rows = [];
  if(d.ev_jiten  && d.ev_jiten.length)  rows.push(`<div class="ev-row"><span class="ev-label lbl-j">自店</span>${d.ev_jiten.map(e=>'<span class="ev-tag tag-j">'+e+'</span>').join('')}</div>`);
  if(d.ev_n1     && d.ev_n1.length)     rows.push(`<div class="ev-row"><span class="ev-label lbl-n">N1</span>${d.ev_n1.map(e=>'<span class="ev-tag tag-n">'+e+'</span>').join('')}</div>`);
  if(d.ev_ni_dai && d.ev_ni_dai.length) rows.push(`<div class="ev-row"><span class="ev-label lbl-ni">大</span>${d.ev_ni_dai.map(e=>'<span class="ev-tag tag-ni">'+e+'</span>').join('')}</div>`);
  if(d.ev_ni_nami&& d.ev_ni_nami.length)rows.push(`<div class="ev-row"><span class="ev-label lbl-ni">並</span>${d.ev_ni_nami.map(e=>'<span class="ev-tag tag-ni">'+e+'</span>').join('')}</div>`);
  return rows.length ? rows.join('') : '<span class="no-data">—</span>';
}
